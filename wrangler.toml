name = "ufcim"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[env.dev]
main = "src/index.dev.ts"
vars = { ENVIRONMENT = "development", JWKS_URL = "http://localhost:8787/dev/jwks", JWT_ISSUER = "http://localhost:8787" }

[[env.dev.d1_databases]]
binding = "DB"
database_name = "ufcim-db"
database_id = "6c2a2f98-6296-492d-b5e9-5c1db08385cb"

[env.production]
main = "src/index.ts"
vars = { ENVIRONMENT = "production", JWKS_URL = "https://your-keycloak/realms/ufc/protocol/openid-connect/certs", JWT_ISSUER = "https://your-keycloak/realms/ufc" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "ufcim-db"
database_id = "6c2a2f98-6296-492d-b5e9-5c1db08385cb"
