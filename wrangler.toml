name = "ufcim"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[env.dev]
main = "src/index.dev.ts"
vars = { ENVIRONMENT = "development", JWKS_URL = "http://localhost:8787/dev/jwks", JWT_ISSUER = "http://localhost:8787", INVITE_BASE_URL = "http://localhost:5173", ADMIN_BASE_URL = "http://localhost:8787/admin", EMAIL_FROM = "UFCIM <noreply@ufcim.integrarte.arq.br>", ALLOWED_EMAIL_DOMAINS = "*.ufc.br,teste.com" }

[env.dev.observability]
enabled = true
head_sampling_rate = 1

[env.dev.observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[env.dev.observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[[env.dev.d1_databases]]
binding = "DB"
database_name = "ufcim-db-dev"
database_id = "6882c3f7-2404-4d5b-a41c-c1ae179469dc"

[env.dev.triggers]
crons = ["0 4 * * *"]   # 04:00 UTC daily

[env.production]
main = "src/index.ts"
vars = { ENVIRONMENT = "production", JWT_ISSUER = "ufcim-prototype", INVITE_BASE_URL = "https://ufcim-front3d.pages.dev/", ADMIN_BASE_URL = "https://ufcim-production.abner-hey.workers.dev/admin", EMAIL_FROM = "UFCIM <noreply@ufcim.integrarte.arq.br>", ALLOWED_EMAIL_DOMAINS = "*.ufc.br,teste.com" }

[env.production.observability]
enabled = true
head_sampling_rate = 1

[env.production.observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[env.production.observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[[env.production.d1_databases]]
binding = "DB"
database_name = "ufcim-db"
database_id = "6c2a2f98-6296-492d-b5e9-5c1db08385cb"

[env.production.triggers]
crons = ["0 4 * * *"]   # 04:00 UTC daily
